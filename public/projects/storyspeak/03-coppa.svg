<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540" role="img" aria-label="StorySpeak — COPPA consent gate">
  <rect width="800" height="540" rx="16" fill="#0a0a0f"/>
  <rect x="12" y="12" width="776" height="32" rx="6" fill="#1a1c26"/>
  <circle cx="28" cy="28" r="5" fill="#ff5f57"/><circle cx="44" cy="28" r="5" fill="#febc2e"/><circle cx="60" cy="28" r="5" fill="#28c840"/>
  <text x="400" y="32" fill="#9ca3af" font-family="ui-mono,monospace" font-size="10" text-anchor="middle">speak.gathermind.app/consent</text>
  <rect x="12" y="56" width="776" height="472" rx="10" fill="#f8fafc"/>
  <rect x="180" y="100" width="440" height="380" rx="20" fill="#fff" stroke="#e2e8f0"/>
  <circle cx="400" cy="160" r="36" fill="#fef3c7"/>
  <text x="400" y="172" text-anchor="middle" font-family="ui-sans-serif" font-size="34">🔒</text>
  <text x="400" y="230" text-anchor="middle" fill="#0f172a" font-family="ui-sans-serif" font-size="20" font-weight="700">Parent consent needed</text>
  <text x="400" y="260" text-anchor="middle" fill="#475569" font-family="ui-sans-serif" font-size="13">Maya is asking to turn on the AI</text>
  <text x="400" y="278" text-anchor="middle" fill="#475569" font-family="ui-sans-serif" font-size="13">reading companion. As her parent,</text>
  <text x="400" y="296" text-anchor="middle" fill="#475569" font-family="ui-sans-serif" font-size="13">we need your one-time approval.</text>
  <rect x="220" y="320" width="360" height="80" rx="12" fill="#f1f5f9"/>
  <text x="240" y="345" fill="#0f172a" font-family="ui-sans-serif" font-size="12" font-weight="700">What the AI does</text>
  <text x="240" y="365" fill="#475569" font-family="ui-sans-serif" font-size="11">• Listens to her read and corrects pronunciation</text>
  <text x="240" y="382" fill="#475569" font-family="ui-sans-serif" font-size="11">• Explains tricky words at her reading level</text>
  <rect x="220" y="420" width="170" height="44" rx="22" fill="#fff" stroke="#cbd5e1"/>
  <text x="305" y="448" text-anchor="middle" fill="#475569" font-family="ui-sans-serif" font-size="14" font-weight="600">Not now</text>
  <rect x="410" y="420" width="170" height="44" rx="22" fill="#7c5cff"/>
  <text x="495" y="448" text-anchor="middle" fill="#fff" font-family="ui-sans-serif" font-size="14" font-weight="600">I approve</text>
</svg>
