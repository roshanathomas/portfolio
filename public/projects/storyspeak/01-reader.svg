<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540" role="img" aria-label="StorySpeak — reader with AI companion">
  <defs>
    <linearGradient id="sbg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fef7ed"/>
      <stop offset="1" stop-color="#fde6d3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="540" rx="16" fill="#0a0a0f"/>
  <rect x="12" y="12" width="776" height="32" rx="6" fill="#1a1c26"/>
  <circle cx="28" cy="28" r="5" fill="#ff5f57"/>
  <circle cx="44" cy="28" r="5" fill="#febc2e"/>
  <circle cx="60" cy="28" r="5" fill="#28c840"/>
  <rect x="200" y="20" width="400" height="16" rx="8" fill="#262834"/>
  <text x="400" y="32" fill="#9ca3af" font-family="ui-mono,monospace" font-size="10" text-anchor="middle">speak.gathermind.app/books/aesop</text>
  <rect x="12" y="56" width="776" height="472" rx="10" fill="url(#sbg)"/>
  <text x="40" y="100" fill="#92400e" font-family="ui-sans-serif" font-size="12" font-weight="700" letter-spacing="2">CHAPTER 3 · AESOP&apos;S FABLES</text>
  <text x="40" y="140" fill="#1c1917" font-family="Georgia, serif" font-size="28" font-weight="700">The Lion and the Mouse</text>
  <g font-family="Georgia, serif" font-size="18" fill="#292524">
    <text x="40" y="200">A lion was awakened from sleep by a mouse</text>
    <text x="40" y="226">running over his face. Rising up angrily, he</text>
    <text x="40" y="252">caught him and was about to kill him, when</text>
    <text x="40" y="278">the mouse <tspan fill="#7c2d12" font-weight="700">piteously</tspan> entreated...</text>
  </g>
  <rect x="40" y="320" width="450" height="80" rx="14" fill="#fff" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="70" cy="360" r="18" fill="#7c5cff"/>
  <text x="70" y="366" text-anchor="middle" fill="#fff" font-family="ui-sans-serif" font-size="14">🦉</text>
  <text x="100" y="350" fill="#92400e" font-family="ui-sans-serif" font-size="10" font-weight="700">READING COMPANION</text>
  <text x="100" y="372" fill="#1c1917" font-family="ui-sans-serif" font-size="13">Nice reading! &quot;Piteously&quot; means in a way that</text>
  <text x="100" y="390" fill="#1c1917" font-family="ui-sans-serif" font-size="13">makes you feel sad. Try the next line?</text>
  <g font-family="ui-sans-serif" font-size="13" font-weight="600">
    <rect x="520" y="320" width="240" height="80" rx="14" fill="#7c5cff"/>
    <circle cx="640" cy="360" r="20" fill="#fff" opacity="0.2"/>
    <text x="640" y="365" text-anchor="middle" fill="#fff" font-size="18">🎤</text>
    <text x="640" y="395" text-anchor="middle" fill="#fff">Read aloud</text>
  </g>
  <g font-family="ui-sans-serif" font-size="11" fill="#78716c">
    <rect x="40" y="440" width="120" height="32" rx="16" fill="#fff" stroke="#e7e5e4"/>
    <text x="100" y="461" text-anchor="middle">← Previous</text>
    <rect x="170" y="440" width="120" height="32" rx="16" fill="#fff" stroke="#e7e5e4"/>
    <text x="230" y="461" text-anchor="middle">Save word</text>
    <rect x="640" y="440" width="120" height="32" rx="16" fill="#1c1917"/>
    <text x="700" y="461" text-anchor="middle" fill="#fff">Next page →</text>
  </g>
