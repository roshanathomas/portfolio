<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" width="800" height="540" role="img" aria-label="MCP tool architecture">
  <rect width="800" height="540" rx="16" fill="#0a0a0f"/>
  <text x="400" y="50" text-anchor="middle" fill="#fff" font-family="ui-sans-serif" font-size="18" font-weight="700">MCP Tool Architecture</text>
  <text x="400" y="72" text-anchor="middle" fill="#9ca3af" font-family="ui-sans-serif" font-size="12">Model Context Protocol cleanly separates the LLM from the data layer</text>

  <rect x="60" y="110" width="200" height="120" rx="16" fill="#1a1c26" stroke="#7c5cff"/>
  <text x="160" y="138" text-anchor="middle" fill="#7c5cff" font-family="ui-mono,monospace" font-size="10" font-weight="700">FRONTEND</text>
  <text x="160" y="162" text-anchor="middle" fill="#fff" font-family="ui-sans-serif" font-size="14" font-weight="600">Expo PWA</text>
  <text x="160" y="184" text-anchor="middle" fill="#9ca3af" font-family="ui-sans-serif" font-size="11">React Native Web</text>
  <text x="160" y="204" text-anchor="middle" fill="#9ca3af" font-family="ui-sans-serif" font-size="11">Voice in/out</text>

  <line x1="260" y1="170" x2="320" y2="170" stroke="#5eead4" stroke-width="2"/>
  <polygon points="320,170 312,166 312,174" fill="#5eead4"/>

  <rect x="320" y="110" width="200" height="120" rx="16" fill="#1a1c26" stroke="#5eead4"/>
  <text x="420" y="138" text-anchor="middle" fill="#5eead4" font-family="ui-mono,monospace" font-size="10" font-weight="700">AGENT CONTROLLER :8080</text>
  <text x="420" y="162" text-anchor="middle" fill="#fff" font-family="ui-sans-serif" font-size="14" font-weight="600">Spring AI + Gemini</text>
  <text x="420" y="184" text-anchor="middle" fill="#9ca3af" font-family="ui-sans-serif" font-size="11">LLM orchestration</text>
  <text x="420" y="204" text-anchor="middle" fill="#9ca3af" font-family="ui-sans-serif" font-size="11">Conversation memory</text>

  <line x1="520" y1="170" x2="580" y2="170" stroke="#ff7a59" stroke-width="2"/>
  <polygon points="580,170 572,166 572,174" fill="#ff7a59"/>
  <text x="550" y="158" text-anchor="middle" fill="#ff7a59" font-family="ui-mono,monospace" font-size="9">MCP</text>

  <rect x="580" y="110" width="170" height="120" rx="16" fill="#1a1c26" stroke="#ff7a59"/>
  <text x="665" y="138" text-anchor="middle" fill="#ff7a59" font-family="ui-mono,monospace" font-size="10" font-weight="700">MCP SERVER :8081</text>
  <text x="665" y="162" text-anchor="middle" fill="#fff" font-family="ui-sans-serif" font-size="14" font-weight="600">13 tools</text>
  <text x="665" y="184" text-anchor="middle" fill="#9ca3af" font-family="ui-sans-serif" font-size="11">PostgreSQL 16</text>
  <text x="665" y="204" text-anchor="middle" fill="#9ca3af" font-family="ui-sans-serif" font-size="11">Flyway migrations</text>

  <text x="60" y="290" fill="#fff" font-family="ui-sans-serif" font-size="14" font-weight="700">Tools the agent can call</text>
  <g font-family="ui-mono,monospace" font-size="11" fill="#5eead4">
    <rect x="60" y="304" width="220" height="36" rx="8" fill="#1a1c26"/><text x="76" y="327">log_meal(name, calories…)</text>
    <rect x="290" y="304" width="220" height="36" rx="8" fill="#1a1c26"/><text x="306" y="327">log_workout(activity, mins)</text>
    <rect x="520" y="304" width="220" height="36" rx="8" fill="#1a1c26"/><text x="536" y="327">get_daily_summary()</text>
    <rect x="60" y="350" width="220" height="36" rx="8" fill="#1a1c26"/><text x="76" y="373">manage_habit(name, target)</text>
    <rect x="290" y="350" width="220" height="36" rx="8" fill="#1a1c26"/><text x="306" y="373">get_habit_progress()</text>
    <rect x="520" y="350" width="220" height="36" rx="8" fill="#1a1c26"/><text x="536" y="373">manage_reminder(text, freq)</text>
    <rect x="60" y="396" width="220" height="36" rx="8" fill="#1a1c26"/><text x="76" y="419">get_nutrition_gap()</text>
    <rect x="290" y="396" width="220" height="36" rx="8" fill="#1a1c26"/><text x="306" y="419">plan_meal(meal_type)</text>
    <rect x="520" y="396" width="220" height="36" rx="8" fill="#1a1c26"/><text x="536" y="419">plan_day()</text>
  </g>
  <text x="400" y="490" text-anchor="middle" fill="#9ca3af" font-family="ui-sans-serif" font-size="12" font-style="italic">Conversation in. Tool calls out. Real data updated.</text>
</svg>
